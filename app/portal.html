<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Portal</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Hallmark · macrostructure: workbench · nav: N6 masthead + tab strip · theme: custom (cool paper · client accent)
 * pre-emit critique: P4 H4 E4 S4 R5 V4 · app-scope: white-label client tool */
:root{
  --paper:      oklch(97.5% 0.006 250);
  --paper-2:    oklch(95% 0.008 250);
  --paper-3:    oklch(92% 0.010 250);
  --rule:       oklch(87.5% 0.010 250);
  --rule-soft:  oklch(91.5% 0.008 250);
  --neutral:    oklch(52% 0.014 250);
  --muted:      oklch(40% 0.016 250);
  --ink:        oklch(21% 0.020 250);
  --accent:     #2e6b4f;              /* replaced by setup file */
  --accent-soft:color-mix(in oklch, var(--accent) 12%, var(--paper));
  --accent-deep:color-mix(in oklch, var(--accent) 82%, black);
  --accent-ink: oklch(97.5% 0.008 250);
  --focus:      color-mix(in oklch, var(--accent) 70%, white);
  --warn:       oklch(52% 0.12 70);
  --warn-soft:  oklch(94% 0.045 85);
  --danger:     oklch(48% 0.16 27);
  --danger-soft:oklch(94% 0.03 27);
  --blue:       oklch(45% 0.10 245);
  --blue-soft:  oklch(93.5% 0.025 245);
  --font-display:"Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
  --font-body:  "Switzer", ui-sans-serif, system-ui, sans-serif;
  --font-mono:  "Geist Mono", ui-monospace, monospace;
  --dur:140ms; --ease:cubic-bezier(.2,.7,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:clip}
body{font-family:var(--font-body);font-size:14px;line-height:1.55;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
::selection{background:var(--accent-soft)}

/* masthead */
.mast{border-bottom:1px solid var(--rule);background:var(--paper);position:sticky;top:0;z-index:30}
.mast-in{max-width:1080px;margin:0 auto;padding:0 22px}
.mast-top{display:flex;align-items:baseline;gap:12px;padding:16px 0 4px}
.mast-top .biz{font-family:var(--font-display);font-weight:800;font-size:21px;letter-spacing:-.02em}
.mast-top .by{font-size:12px;color:var(--neutral);margin-left:auto;white-space:nowrap}
.mast-tabs{display:flex;gap:2px;overflow-x:auto}
.mast-tabs a{
  font-size:13.5px;font-weight:500;color:var(--neutral);text-decoration:none;white-space:nowrap;
  padding:9px 13px;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.mast-tabs a:hover{color:var(--ink)}
.mast-tabs a.on{color:var(--accent-deep);border-bottom-color:var(--accent);font-weight:600}
.mast-tabs a:focus-visible{outline:2px solid var(--focus);outline-offset:-2px;border-radius:4px}

.wrap{max-width:1080px;margin:0 auto;padding:24px 22px 70px}
h1.page{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.015em}
.page-sub{color:var(--neutral);font-size:13px;margin-top:3px}
.page-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.page-head .grow{flex:1;min-width:200px}
h2.sect{font-family:var(--font-display);font-weight:700;font-size:15px;margin:24px 0 10px}
.num{font-variant-numeric:tabular-nums}

.btn{font:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--rule);background:var(--paper);color:var(--ink);padding:7px 13px;border-radius:8px;display:inline-flex;align-items:center;gap:7px;transition:background-color var(--dur) var(--ease),border-color var(--dur) var(--ease)}
.btn:hover{background:var(--paper-2);border-color:var(--neutral)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fdfdfc}
.btn.pri:hover{background:var(--accent-deep);border-color:var(--accent-deep)}
.btn.danger{color:var(--danger)}
.btn.danger:hover{border-color:var(--danger);background:var(--danger-soft)}
.btn.sm{padding:4px 9px;font-size:12px;border-radius:6px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:var(--paper-2);color:var(--ink)}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:10px;overflow:hidden}
.stat{background:var(--paper);padding:14px 16px}
.stat .v{font-family:var(--font-display);font-weight:800;font-size:23px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.1}
.stat .l{font-size:12px;color:var(--neutral);margin-top:3px}
.stat .d{font-size:11.5px;color:var(--muted);margin-top:2px}

.tbl-wrap{border:1px solid var(--rule);border-radius:10px;overflow:auto;background:var(--paper)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--neutral);padding:9px 14px;border-bottom:1px solid var(--rule);background:var(--paper-2);white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:10px 14px;border-bottom:1px solid var(--rule-soft);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr.rowlink{cursor:pointer;transition:background-color var(--dur) var(--ease)}
tbody tr.rowlink:hover{background:var(--paper-2)}
td .sub{display:block;font-size:12px;color:var(--neutral)}
.empty{padding:34px 20px;text-align:center;color:var(--neutral);font-size:13px}
.empty b{display:block;color:var(--muted);font-weight:600;margin-bottom:3px}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:2.5px 9px;border-radius:20px;background:var(--paper-3);color:var(--muted);white-space:nowrap}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
.chip.s-Won,.chip.s-Accepted,.chip.s-Completed,.chip.s-Paid{background:var(--accent-soft);color:var(--accent-deep)}
.chip.s-New,.chip.s-Scheduled,.chip.s-Sent{background:var(--blue-soft);color:var(--blue)}
.chip.s-Contacted,.chip.s-Quoted{background:var(--warn-soft);color:var(--warn)}
.chip.s-Lost,.chip.s-Declined,.chip.s-Canceled{background:var(--danger-soft);color:var(--danger)}

.cols{display:grid;gap:16px}
.cols.c2{grid-template-columns:1fr 1fr}
.panel{border:1px solid var(--rule);border-radius:10px;background:var(--paper);padding:16px 18px}
.panel h3{font-family:var(--font-display);font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.panel h3 .btn{margin-left:auto}
.list-line{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--rule-soft);font-size:13.5px}
.list-line:last-child{border-bottom:none}
.list-line .when{margin-left:auto;font-size:12px;color:var(--neutral);white-space:nowrap;font-variant-numeric:tabular-nums}
.due-red{color:var(--danger);font-weight:500}
.due-amber{color:var(--warn);font-weight:500}

.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(200px,1fr);gap:12px;overflow-x:auto;padding-bottom:8px;align-items:start}
.kcol{background:var(--paper-2);border:1px solid var(--rule-soft);border-radius:10px;min-height:110px}
.kcol.dragover{border-color:var(--accent);background:var(--accent-soft)}
.kcol h4{font-size:11.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--neutral);padding:10px 12px 6px;display:flex;gap:8px;align-items:baseline}
.kcol h4 .n{margin-left:auto;font-family:var(--font-mono);font-size:11px}
.kcol .kbody{padding:4px 8px 10px;display:flex;flex-direction:column;gap:7px}
.kcard{background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;cursor:grab;transition:border-color var(--dur) var(--ease)}
.kcard:hover{border-color:var(--neutral)}
.kcard.dragging{opacity:.45}
.kcard b{font-weight:600;font-size:13px;display:block;margin-bottom:2px}
.kcard .meta{font-size:12px;color:var(--neutral);display:flex;justify-content:space-between;gap:8px}

/* calendar */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cal-head b{font-family:var(--font-display);font-size:16px;font-weight:700;min-width:150px;text-align:center}
.cal{border:1px solid var(--rule);border-radius:10px;overflow:hidden;background:var(--rule)}
.cal-dow,.cal-week{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px}
.cal-dow span{background:var(--paper-2);font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--neutral);padding:7px 9px}
.cal-day{background:var(--paper);min-height:86px;padding:6px 7px;cursor:pointer;transition:background-color var(--dur) var(--ease)}
.cal-day:hover{background:var(--paper-2)}
.cal-day .dn{font-size:11.5px;color:var(--neutral);font-variant-numeric:tabular-nums}
.cal-day.other{background:var(--paper-2);opacity:.55}
.cal-day.today .dn{color:var(--accent-deep);font-weight:700}
.cal-day.today{box-shadow:inset 0 0 0 1.5px var(--accent)}
.cal-job{font-size:11px;font-weight:500;background:var(--accent-soft);color:var(--accent-deep);border-radius:5px;padding:2px 6px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-job.done{background:var(--paper-3);color:var(--neutral);text-decoration:line-through}

/* forms / modal */
.modal-bg{position:fixed;inset:0;background:oklch(20% .02 250 / .45);display:none;align-items:flex-start;justify-content:center;z-index:60;overflow:auto;padding:48px 16px}
.modal-bg.show{display:flex}
.modal{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:22px;width:560px;max-width:100%;box-shadow:0 18px 50px -18px oklch(25% .03 250 / .35)}
.modal h3{font-family:var(--font-display);font-weight:700;font-size:16px;margin-bottom:16px}
.fg{margin-bottom:12px;min-width:0}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
input,select,textarea{font:inherit;font-size:13.5px;width:100%;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:7px;padding:7px 10px}
input::placeholder{color:var(--neutral)}
input:hover,select:hover,textarea:hover{border-color:var(--neutral)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--focus);outline-offset:-1px;border-color:var(--focus)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;align-items:center}
.modal-actions .left{margin-right:auto}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--paper);border-radius:9px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:14px;z-index:80;opacity:0;pointer-events:none;transition:opacity 180ms var(--ease),transform 180ms var(--ease)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast button{font:inherit;font-weight:600;background:none;border:none;color:var(--accent-soft);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

.chart-box{border:1px solid var(--rule);border-radius:10px;background:var(--paper);padding:14px 16px 8px}
.chart-box h3{font-family:var(--font-display);font-size:13.5px;font-weight:700;margin-bottom:6px}
.notice{border:1px solid var(--rule);border-left:3px solid var(--accent);border-radius:8px;background:var(--paper-2);padding:10px 14px;font-size:13px;color:var(--muted);margin-bottom:16px}
.hide{display:none!important}

/* first-run setup */
.setup{max-width:480px;margin:9vh auto 0;padding:0 22px}
.setup .card{border:1px solid var(--rule);border-radius:14px;background:var(--paper);padding:30px 30px 26px}
.setup h1{font-family:var(--font-display);font-weight:800;font-size:24px;letter-spacing:-.02em;margin-bottom:6px}
.setup p{color:var(--muted);font-size:13.5px;margin-bottom:18px}
.setup .or{display:flex;align-items:center;gap:12px;color:var(--neutral);font-size:12px;margin:18px 0}
.setup .or::before,.setup .or::after{content:"";flex:1;height:1px;background:var(--rule)}

@media(max-width:760px){
  .cols.c2,.grid2{grid-template-columns:1fr}
  .cal-day{min-height:64px}
  .wrap{padding:18px 14px 60px}
}
</style>
</head>
<body>
<div id="app"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn danger left hide" id="modalDelete">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn pri" id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span><button id="toastAction"></button></div>
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
/* ============ constants ============ */
const KEY='pf_portal_v1';
const LEAD_STAGES=['New','Contacted','Quoted','Won','Lost'];
const JOB_STATUSES=['Scheduled','Completed','Canceled'];
const QUOTE_STATUSES=['Sent','Accepted','Declined'];
const SOURCES=['Ad','Referral','Word of mouth','Google','Repeat customer','Other'];

/* ============ state ============ */
let db=load(), route='today', calCursor=monthStart(new Date()), toastTimer=null;
function blank(){ return {v:1,client_id:'',business:{name:'',industry:'',location:'',accent:'#2e6b4f',agency:'your marketing partner'},leads:[],jobs:[],quotes:[],ads:[]}; }
function load(){ try{ const r=localStorage.getItem(KEY); if(r){ const d=JSON.parse(r); if(d&&d.v===1) return d; } }catch(e){} return null; }
function save(){ localStorage.setItem(KEY,JSON.stringify(db)); render(); }

/* ============ utils ============ */
function uid(p){ return p+'-'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ n=+n||0; return n?'$'+n.toLocaleString(undefined,{maximumFractionDigits:0}):'—'; }
function fmtDate(s){ if(!s)return '—'; const d=new Date(s+'T00:00'); if(isNaN(d))return esc(s); return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:d.getFullYear()===new Date().getFullYear()?undefined:'numeric'}); }
function today(){ return ymd(new Date()); }
function monthKey(d){ return ymd(d||new Date()).slice(0,7); }
function monthLabel(k){ const [y,m]=k.split('-'); return new Date(+y,+m-1,1).toLocaleDateString(undefined,{month:'short',year:'2-digit'}); }
function monthStart(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function daysUntil(s){ if(!s)return null; return Math.round((new Date(s+'T00:00')-new Date(today()+'T00:00'))/864e5); }
function chip(s){ return '<span class="chip s-'+String(s||'').replace(/\s/g,'')+'">'+esc(s)+'</span>'; }
function ratio(a,b){ return b>0?a/b:null; }
function fmtRatio(v,pre,dec){ return v==null?'—':(pre||'')+v.toFixed(dec==null?2:dec); }
function selOpts(list,cur){ return list.map(o=>'<option'+(o===cur?' selected':'')+'>'+esc(o)+'</option>').join(''); }
function download(name,text){ const b=new Blob([text],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
function toast(msg,label,fn){
 const t=document.getElementById('toast'),a=document.getElementById('toastAction');
 document.getElementById('toastMsg').textContent=msg;
 if(label){a.textContent=label;a.classList.remove('hide');a.onclick=()=>{t.classList.remove('show');fn&&fn();};}
 else a.classList.add('hide');
 t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),6000);
}
function softDelete(msg,restoreFn){ save(); toast(msg,'Undo',()=>{ restoreFn(); save(); }); }

/* ============ modal ============ */
function openModal(cfg){
 document.getElementById('modalTitle').textContent=cfg.title;
 document.getElementById('modalBody').innerHTML=buildForm(cfg.fields);
 const del=document.getElementById('modalDelete');
 del.classList.toggle('hide',!cfg.onDelete);
 del.onclick=()=>{ closeModal(); cfg.onDelete(); };
 document.getElementById('modalSave').onclick=()=>{
  const vals={};
  cfg.fields.forEach(f=>{ const el=document.getElementById('f_'+f.k); if(!el)return; vals[f.k]=f.type==='number'?(+el.value||0):el.value.trim(); });
  closeModal(); cfg.onSave(vals);
 };
 document.getElementById('modalBg').classList.add('show');
 const first=document.querySelector('#modalBody input,#modalBody select,#modalBody textarea'); first&&first.focus();
}
function buildForm(fields){
 let html='',row=[];
 const flush=()=>{ if(!row.length)return; html+=row.length===1?row[0]:'<div class="grid2">'+row.join('')+'</div>'; row=[]; };
 fields.forEach(f=>{
  const v=f.value==null?'':f.value; let inner;
  if(f.type==='select') inner='<select id="f_'+f.k+'">'+selOpts(f.options,v)+'</select>';
  else if(f.type==='textarea') inner='<textarea id="f_'+f.k+'" rows="3">'+esc(v)+'</textarea>';
  else if(f.type==='color') inner='<input id="f_'+f.k+'" type="color" value="'+esc(v||'#2e6b4f')+'" style="height:36px;padding:3px">';
  else inner='<input id="f_'+f.k+'" type="'+(f.type||'text')+'" value="'+esc(v)+'"'+(f.placeholder?' placeholder="'+esc(f.placeholder)+'"':'')+'>';
  const cell='<div class="fg"><label for="f_'+f.k+'">'+esc(f.label)+'</label>'+inner+'</div>';
  if(f.full){ flush(); html+=cell; } else { row.push(cell); if(row.length===2)flush(); }
 });
 flush(); return html;
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg')closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

/* ============ render ============ */
function go(r){ route=r; render(); window.scrollTo(0,0); }
function render(){
 const app=document.getElementById('app');
 if(!db){ app.innerHTML=renderSetup(); return; }
 document.documentElement.style.setProperty('--accent',db.business.accent||'#2e6b4f');
 document.title=(db.business.name||'Business')+' · Portal';
 const tabs=[['today','Today'],['leads','Leads'],['schedule','Schedule'],['quotes','Quotes'],['results','Marketing results'],['settings','Settings']];
 app.innerHTML='<header class="mast"><div class="mast-in">'
  +'<div class="mast-top"><span class="biz">'+esc(db.business.name||'Your business')+'</span>'
  +'<span class="by">marketing by '+esc(db.business.agency||'your partner')+'</span></div>'
  +'<nav class="mast-tabs">'+tabs.map(t=>'<a href="#" class="'+(route===t[0]?'on':'')+'" onclick="go(\''+t[0]+'\');return false">'+t[1]+'</a>').join('')+'</nav>'
  +'</div></header><div class="wrap">'
  +({today:renderToday,leads:renderLeads,schedule:renderSchedule,quotes:renderQuotes,results:renderResults,settings:renderSettings}[route]||renderToday)()
  +'</div>';
 bindDnD();
}

/* ============ setup ============ */
function renderSetup(){
 return '<div class="setup"><div class="card">'
  +'<h1>Set up your portal</h1>'
  +'<p>This is your business hub — track leads, schedule jobs, send quotes and see how your marketing is performing. Everything saves privately in this browser.</p>'
  +'<button class="btn pri" onclick="setupImport()">Import your setup file</button>'
  +'<p style="font-size:12px;color:var(--neutral);margin-top:8px">Your marketing partner sent this alongside the portal — it loads your branding and any existing customers.</p>'
  +'<div class="or">or start fresh</div>'
  +'<div class="fg"><label>Business name</label><input id="su_name" placeholder="Smith Pressure Washing"></div>'
  +'<div class="fg"><label>What you do</label><input id="su_ind" placeholder="Pressure washing"></div>'
  +'<button class="btn" onclick="setupManual()">Start fresh</button>'
  +'</div></div>';
}
function setupImport(){ document.getElementById('fileInput').click(); }
function setupManual(){
 db=blank();
 db.business.name=document.getElementById('su_name').value.trim()||'My business';
 db.business.industry=document.getElementById('su_ind').value.trim();
 db.client_id=uid('CL');
 save();
}

/* ============ today ============ */
function renderToday(){
 const t=today(), mk=monthKey();
 const todays=db.jobs.filter(j=>j.date===t&&j.status==='Scheduled');
 const upcoming=db.jobs.filter(j=>j.date>t&&j.status==='Scheduled').sort((a,b)=>a.date<b.date?-1:1);
 const overdueF=db.leads.filter(l=>l.follow_up&&!['Won','Lost'].includes(l.stage)&&daysUntil(l.follow_up)<=0)
  .sort((a,b)=>a.follow_up<b.follow_up?-1:1);
 const openLeads=db.leads.filter(l=>!['Won','Lost'].includes(l.stage));
 const pipeline=openLeads.reduce((s,l)=>s+(+l.quote_value||0),0);
 const monthRev=db.jobs.filter(j=>j.status==='Completed'&&(j.date||'').slice(0,7)===mk).reduce((s,j)=>s+(+j.price||0),0);

/* ============ schedule ============ */
function renderSchedule(){
 const y=calCursor.getFullYear(), m=calCursor.getMonth();
 const first=new Date(y,m,1), startDow=first.getDay();
 const gridStart=new Date(y,m,1-startDow);
 const t=today();
 const byDate={};
 db.jobs.forEach(j=>{ if(j.date){ (byDate[j.date]=byDate[j.date]||[]).push(j); } });
 let weeks='';
 for(let w=0;w<6;w++){
  let cells='';
  for(let d=0;d<7;d++){
   const day=new Date(gridStart); day.setDate(gridStart.getDate()+w*7+d);
   const key=ymd(day), other=day.getMonth()!==m, isToday=key===t;
   const jobs=byDate[key]||[];
   cells+='<div class="cal-day'+(other?' other':'')+(isToday?' today':'')+'" onclick="openJobModal(null,\''+key+'\')">'
    +'<span class="dn">'+day.getDate()+'</span>'
    +jobs.slice(0,3).map(j=>'<div class="cal-job'+(j.status==='Completed'?' done':'')+'" onclick="event.stopPropagation();openJobModal(\''+j.id+'\')" title="'+esc(j.title+(j.customer?' · '+j.customer:''))+'">'+esc(j.title)+'</div>').join('')
    +(jobs.length>3?'<div style="font-size:10.5px;color:var(--neutral);margin-top:2px">+'+(jobs.length-3)+' more</div>':'')
    +'</div>';
  }
  weeks+='<div class="cal-week">'+cells+'</div>';
 }
 const monthJobs=db.jobs.filter(j=>(j.date||'').slice(0,7)===monthKey(calCursor)&&j.status!=='Canceled');
 const booked=monthJobs.reduce((s,j)=>s+(+j.price||0),0);
 const done=monthJobs.filter(j=>j.status==='Completed').reduce((s,j)=>s+(+j.price||0),0);
 return '<div class="page-head"><div class="grow"><h1 class="page">Schedule</h1><div class="page-sub">Click a day to book a job. '+money(booked)+' booked this month · '+money(done)+' completed.</div></div>'
  +'<button class="btn pri" onclick="openJobModal()">+ Job</button></div>'
  +'<div class="cal-head"><button class="btn sm" onclick="calMove(-1)" aria-label="Previous month">‹</button>'
  +'<b>'+calCursor.toLocaleDateString(undefined,{month:'long',year:'numeric'})+'</b>'
  +'<button class="btn sm" onclick="calMove(1)" aria-label="Next month">›</button>'
  +'<button class="btn sm ghost" onclick="calCursor=monthStart(new Date());render()">Today</button></div>'
  +'<div class="cal"><div class="cal-dow">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>'<span>'+d+'</span>').join('')+'</div>'+weeks+'</div>';
}
function calMove(n){ calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth()+n,1); render(); }

  +'<div class="chart-box"><h3>Leads generated</h3>'+barChart(months.map(m=>({label:monthLabel(m),v:byMonth[m].leads})),'')+'</div></div>'
  +'<div class="tbl-wrap"><table><thead><tr><th>Month</th><th>Campaign</th><th class="r">Spend</th><th class="r">Leads</th><th class="r">Cost per lead</th><th class="r">Jobs won</th><th class="r">Revenue</th></tr></thead><tbody>'
  +ads.map(a=>'<tr><td class="num">'+esc(a.period)+'</td><td>'+esc(a.campaign||'—')+'</td><td class="r num">'+money(a.spend)+'</td><td class="r num">'+(+a.leads||'—')+'</td>'
   +'<td class="r num">'+fmtRatio(ratio(+a.spend,+a.leads),'$',0)+'</td><td class="r num">'+(+a.sales||'—')+'</td><td class="r num">'+money(a.revenue)+'</td></tr>').join('')
  +'</tbody></table></div>';
}
function barChart(series,prefix){
 if(!series.length) return '';
 const W=440,H=150,pad=6,bw=Math.min(46,(W-pad*2)/series.length-8);
 const max=Math.max(...series.map(s=>s.v),1);
 let bars='';
 series.forEach((s,i)=>{
  const x=pad+i*((W-pad*2)/series.length)+((W-pad*2)/series.length-bw)/2;
  const h=Math.max(2,(s.v/max)*(H-38)), y=H-22-h;
  bars+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+h.toFixed(1)+'" rx="3" fill="var(--accent)" opacity="0.85"/>'
   +'<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-5).toFixed(1)+'" text-anchor="middle" font-size="10" fill="var(--muted)" style="font-family:var(--font-mono)">'+(prefix==='$'?'$'+Math.round(s.v).toLocaleString():Math.round(s.v))+'</text>'
   +'<text x="'+(x+bw/2).toFixed(1)+'" y="'+(H-7)+'" text-anchor="middle" font-size="10" fill="var(--neutral)">'+esc(s.label)+'</text>';
 });
 return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="bar chart">'+bars+'</svg>';
}

/* ============ import ============ */
document.getElementById('fileInput').addEventListener('change',e=>{
 const f=e.target.files[0]; if(!f)return;
 const r=new FileReader();
 r.onload=()=>{
  try{
   const d=JSON.parse(r.result);
   if(d.kind==='pf-portal-setup'){
    const fresh=!db;
    if(fresh) db=blank();
    db.client_id=d.client_id||db.client_id;
    db.business=Object.assign(db.business,d.business||{});
    if(d.data){
     if(fresh||!db.leads.length) db.leads=d.data.leads||db.leads;
     if(fresh||!db.jobs.length) db.jobs=d.data.jobs||db.jobs;
     if(fresh||!db.quotes.length) db.quotes=d.data.quotes||db.quotes;
     db.ads=d.data.ads||db.ads;
    }
    save(); toast('Welcome, '+(db.business.name||'friend')+' — your portal is ready');
   } else if(d.kind==='pf-portal-results'){
    if(!db){ toast('Set up the portal first, then import results'); render(); return; }
    db.ads=d.ads||[];
    save(); go('results'); toast('Marketing results updated');
   } else if(d.v===1&&d.business){
    db=d; save(); toast('Backup restored');
   } else toast('Not a recognized file');
  }catch(err){ toast('Could not read file: '+err.message); }
 };
 r.readAsText(f); e.target.value='';
});

render();
</script>
