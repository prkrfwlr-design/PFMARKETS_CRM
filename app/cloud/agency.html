<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parker · Client Operations</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
/* Hallmark · macrostructure: workbench · nav: N3 side-rail · theme: custom (oat paper · spruce accent)
 * pre-emit critique: P4 H4 E4 S4 R5 V4 · app-scope: cloud dashboard, Supabase-backed */
:root{
  --paper:      oklch(97% 0.008 95);
  --paper-2:    oklch(94.8% 0.010 95);
  --paper-3:    oklch(91.5% 0.012 95);
  --rule:       oklch(87% 0.012 95);
  --rule-soft:  oklch(91% 0.009 95);
  --neutral:    oklch(52% 0.014 95);
  --muted:      oklch(40% 0.016 95);
  --ink:        oklch(22% 0.018 95);
  --accent:     oklch(44% 0.10 158);
  --accent-deep:oklch(36% 0.09 158);
  --accent-soft:oklch(93% 0.030 158);
  --accent-ink: oklch(97% 0.012 158);
  --focus:      oklch(52% 0.15 158);
  --warn:       oklch(52% 0.12 70);
  --warn-soft:  oklch(94% 0.045 85);
  --danger:     oklch(48% 0.16 27);
  --danger-soft:oklch(94% 0.03 27);
  --blue:       oklch(45% 0.10 245);
  --blue-soft:  oklch(93.5% 0.025 245);
  --font-display:"Cabinet Grotesk", ui-sans-serif, system-ui, sans-serif;
  --font-body:  "Switzer", ui-sans-serif, system-ui, sans-serif;
  --font-mono:  "Geist Mono", ui-monospace, "SF Mono", monospace;
  --dur:140ms; --ease:cubic-bezier(.2,.7,.3,1);
  --rail-w:222px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:clip}
body{font-family:var(--font-body);font-size:14px;line-height:1.55;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
::selection{background:var(--accent-soft)}

/* ---------- auth ---------- */
.auth{max-width:420px;margin:11vh auto 0;padding:0 22px}
.auth .card{border:1px solid var(--rule);border-radius:14px;background:var(--paper);padding:30px 30px 26px}
.auth h1{font-family:var(--font-display);font-weight:800;font-size:23px;letter-spacing:-.02em;margin-bottom:4px}
.auth .tag{font-family:var(--font-mono);font-size:10.5px;color:var(--neutral);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:16px}
.auth p{color:var(--muted);font-size:13.5px;margin-bottom:16px}
.auth .err{border:1px solid var(--danger);border-radius:8px;background:var(--danger-soft);color:var(--danger);padding:9px 13px;font-size:13px;margin-bottom:12px}
.auth .swap{font-size:12.5px;color:var(--neutral);margin-top:14px}
.auth .swap button{font:inherit;background:none;border:none;color:var(--accent-deep);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.auth code{font-family:var(--font-mono);font-size:12px;background:var(--paper-2);border:1px solid var(--rule);border-radius:5px;padding:1px 6px}

/* ---------- rail ---------- */
.rail{position:fixed;inset:0 auto 0 0;width:var(--rail-w);background:var(--paper-2);border-right:1px solid var(--rule);display:flex;flex-direction:column;padding:18px 0 12px;z-index:30}
.wordmark{padding:0 20px 16px;border-bottom:1px solid var(--rule-soft)}
.wordmark .wm{font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-.01em}
.wordmark .wm-tag{font-family:var(--font-mono);font-size:10.5px;color:var(--neutral);letter-spacing:.08em;text-transform:uppercase;display:block;margin-top:1px}
.rail nav{flex:1;padding:12px 10px;overflow-y:auto}
.rail .nav-group{font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--neutral);padding:14px 12px 5px}
.rail a.nav-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:7px;color:var(--muted);text-decoration:none;white-space:nowrap;transition:background-color var(--dur) var(--ease),color var(--dur) var(--ease)}
.rail a.nav-item svg{width:15px;height:15px;flex:none;stroke:currentColor}
.rail a.nav-item:hover{background:var(--paper-3);color:var(--ink)}
.rail a.nav-item.on{background:var(--accent-soft);color:var(--accent-deep);font-weight:500}
.rail a.nav-item:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
.rail .nav-count{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--neutral)}
.rail-foot{padding:12px 20px 4px;border-top:1px solid var(--rule-soft);font-size:12px;color:var(--neutral)}
.rail-foot .saved{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.rail-foot .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.rail-foot button{font:inherit;font-size:12px;background:none;border:none;color:var(--neutral);cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:0}
.rail-foot button:hover{color:var(--ink)}

/* ---------- main ---------- */
.main{margin-left:var(--rail-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:13px 28px;border-bottom:1px solid var(--rule);background:var(--paper);position:sticky;top:0;z-index:20}
.crumbs{font-size:13px;color:var(--neutral);display:flex;align-items:center;gap:8px;min-width:0}
.crumbs a{color:var(--neutral);text-decoration:none;white-space:nowrap}
.crumbs a:hover{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
.crumbs .here{color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;border:1px solid var(--rule);border-radius:8px;padding:6px 10px;width:250px;background:var(--paper);color:var(--neutral);cursor:text}
.search:focus-within{border-color:var(--focus);outline:2px solid var(--focus);outline-offset:-1px}
.search input{border:none;background:none;font:inherit;color:var(--ink);width:100%;outline:none}
.search kbd{font-family:var(--font-mono);font-size:10.5px;border:1px solid var(--rule);border-radius:4px;padding:1px 5px;color:var(--neutral)}
.content{padding:26px 28px 60px;max-width:1220px;width:100%}

/* ---------- typography ---------- */
h1.page{font-family:var(--font-display);font-weight:700;font-size:23px;letter-spacing:-.015em;line-height:1.15}
.page-sub{color:var(--neutral);font-size:13px;margin-top:3px}
.page-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.page-head .grow{flex:1;min-width:200px}
h2.sect{font-family:var(--font-display);font-weight:700;font-size:15.5px;letter-spacing:-.01em;margin:26px 0 10px}
h2.sect:first-child{margin-top:0}
.num{font-variant-numeric:tabular-nums}

/* ---------- buttons ---------- */
.btn{font:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--rule);background:var(--paper);color:var(--ink);padding:7px 13px;border-radius:8px;display:inline-flex;align-items:center;gap:7px;transition:background-color var(--dur) var(--ease),border-color var(--dur) var(--ease)}
.btn:hover{background:var(--paper-2);border-color:var(--neutral)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.btn.pri{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.btn.pri:hover{background:var(--accent-deep);border-color:var(--accent-deep)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:var(--paper-2);color:var(--ink)}
.btn.danger{color:var(--danger)}
.btn.danger:hover{border-color:var(--danger);background:var(--danger-soft)}
.btn.sm{padding:4px 9px;font-size:12px;border-radius:6px}

/* ---------- stats ---------- */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:10px;overflow:hidden;margin-bottom:8px}
.stat{background:var(--paper);padding:15px 17px}
.stat .v{font-family:var(--font-display);font-weight:800;font-size:24px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.1}
.stat .l{font-size:12px;color:var(--neutral);margin-top:3px}
.stat .d{font-size:11.5px;margin-top:2px;color:var(--muted)}

/* ---------- tables ---------- */
.tbl-wrap{border:1px solid var(--rule);border-radius:10px;overflow:auto;background:var(--paper)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--neutral);padding:9px 14px;border-bottom:1px solid var(--rule);background:var(--paper-2);white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:10px 14px;border-bottom:1px solid var(--rule-soft);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr.rowlink{cursor:pointer;transition:background-color var(--dur) var(--ease)}
tbody tr.rowlink:hover{background:var(--paper-2)}
td .sub{display:block;font-size:12px;color:var(--neutral)}
td.num,th.num{font-variant-numeric:tabular-nums}
.empty{padding:38px 20px;text-align:center;color:var(--neutral);font-size:13px}
.empty b{display:block;color:var(--muted);font-weight:600;margin-bottom:3px}

/* ---------- chips ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:2.5px 9px;border-radius:20px;background:var(--paper-3);color:var(--muted);white-space:nowrap}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
.chip.s-Active,.chip.s-Won,.chip.s-Paid,.chip.s-Accepted,.chip.s-Done,.chip.s-Completed,.chip.s-Linked,.chip.s-Clockedin,.chip.s-Replied,.chip.s-ClosedWon{background:var(--accent-soft);color:var(--accent-deep)}
.chip.s-Prospect,.chip.s-New,.chip.s-Scheduled,.chip.s-Sent,.chip.s-Lead{background:var(--blue-soft);color:var(--blue)}
.chip.s-Contacted,.chip.s-Quoted,.chip.s-Proposal,.chip.s-Due,.chip.s-InProgress,.chip.s-Waiting,.chip.s-Pending,.chip.s-NeedsFollow-up{background:var(--warn-soft);color:var(--warn)}
.chip.s-Churned,.chip.s-Lost,.chip.s-Paused,.chip.s-Overdue,.chip.s-Declined,.chip.s-Terminated,.chip.s-Blocked,.chip.s-ClosedLost{background:var(--danger-soft);color:var(--danger)}
.svc{display:inline-block;font-size:11px;padding:1.5px 7px;border-radius:5px;border:1px solid var(--rule);color:var(--muted);margin:1px 3px 1px 0;background:var(--paper)}
.idm{font-family:var(--font-mono);font-size:11px;color:var(--neutral)}

/* ---------- panels / layout ---------- */
.cols{display:grid;gap:16px}
.cols.c2{grid-template-columns:1fr 1fr}
.cols.c32{grid-template-columns:3fr 2fr}
.panel{border:1px solid var(--rule);border-radius:10px;background:var(--paper);padding:16px 18px}
.panel h3{font-family:var(--font-display);font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.panel h3 .btn{margin-left:auto}
.kv{display:grid;grid-template-columns:130px 1fr;gap:6px 14px;font-size:13.5px}
.kv dt{color:var(--neutral)}
.kv dd{color:var(--ink);overflow-wrap:anywhere}
.list-line{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--rule-soft);font-size:13.5px}
.list-line:last-child{border-bottom:none}
.list-line .when{margin-left:auto;font-size:12px;color:var(--neutral);white-space:nowrap;font-variant-numeric:tabular-nums}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--rule);margin-bottom:18px;overflow-x:auto}
.tabs button{font:inherit;font-size:13px;font-weight:500;color:var(--neutral);background:none;border:none;padding:8px 13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tabs button:hover{color:var(--ink)}
.tabs button.on{color:var(--accent-deep);border-bottom-color:var(--accent)}
.tabs button:focus-visible{outline:2px solid var(--focus);outline-offset:-2px;border-radius:4px}

/* ---------- kanban ---------- */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(215px,1fr);gap:12px;overflow-x:auto;padding-bottom:8px;align-items:start}
.kcol{background:var(--paper-2);border:1px solid var(--rule-soft);border-radius:10px;min-height:120px}
.kcol.dragover{border-color:var(--accent);background:var(--accent-soft)}
.kcol h4{font-size:11.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--neutral);padding:10px 12px 6px;display:flex;gap:8px;align-items:baseline}
.kcol h4 .n{margin-left:auto;font-family:var(--font-mono);font-size:11px}
.kcol .kbody{padding:4px 8px 10px;display:flex;flex-direction:column;gap:7px}
.kcard{background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;cursor:grab;transition:border-color var(--dur) var(--ease)}
.kcard:hover{border-color:var(--neutral)}
.kcard.dragging{opacity:.45}
.kcard b{font-weight:600;font-size:13px;display:block;margin-bottom:2px}
.kcard .meta{font-size:12px;color:var(--neutral);display:flex;justify-content:space-between;gap:8px}
.kcard .meta .num{font-variant-numeric:tabular-nums}

/* ---------- forms / modal ---------- */
.modal-bg{position:fixed;inset:0;background:oklch(20% .02 95 / .45);display:none;align-items:flex-start;justify-content:center;z-index:60;overflow:auto;padding:48px 16px}
.modal-bg.show{display:flex}
.modal{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:22px;width:590px;max-width:100%;box-shadow:0 18px 50px -18px oklch(25% .03 95 / .35)}
.modal h3{font-family:var(--font-display);font-weight:700;font-size:16px;margin-bottom:16px}
.fg{margin-bottom:12px;min-width:0}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
input,select,textarea{font:inherit;font-size:13.5px;width:100%;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:7px;padding:7px 10px}
input::placeholder,textarea::placeholder{color:var(--neutral)}
input:hover,select:hover,textarea:hover{border-color:var(--neutral)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--focus);outline-offset:-1px;border-color:var(--focus)}
input:disabled,select:disabled{background:var(--paper-2);color:var(--neutral);cursor:not-allowed}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;align-items:center}
.modal-actions .left{margin-right:auto}

/* ---------- toast ---------- */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--paper);border-radius:9px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:14px;z-index:80;opacity:0;pointer-events:none;transition:opacity 180ms var(--ease),transform 180ms var(--ease)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast button{font:inherit;font-weight:600;background:none;border:none;color:var(--accent-soft);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

/* ---------- checklist ---------- */
.phase{border:1px solid var(--rule);border-radius:10px;margin-bottom:12px;background:var(--paper);overflow:hidden}
.phase>header{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;background:var(--paper-2)}
.phase>header b{font-size:13.5px}
.phase>header .prog{margin-left:auto;font-family:var(--font-mono);font-size:11.5px;color:var(--neutral)}
.phase .items{padding:6px 15px 10px;display:none}
.phase.open .items{display:block}
.citem{display:flex;align-items:flex-start;gap:9px;padding:6px 0;font-size:13.5px;border-bottom:1px solid var(--rule-soft)}
.citem:last-child{border-bottom:none}
.citem input[type=checkbox]{width:15px;height:15px;margin-top:2px;accent-color:var(--accent);cursor:pointer}
.citem.done span{color:var(--neutral);text-decoration:line-through}

/* ---------- charts / misc ---------- */
.chart-box{border:1px solid var(--rule);border-radius:10px;background:var(--paper);padding:14px 16px 8px}
.chart-box h3{font-family:var(--font-display);font-size:13.5px;font-weight:700;margin-bottom:6px}
.notice{border:1px solid var(--rule);border-left:3px solid var(--accent);border-radius:8px;background:var(--paper-2);padding:10px 14px;font-size:13px;color:var(--muted);margin-bottom:16px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{width:auto;min-width:130px}
.due-red{color:var(--danger);font-weight:500}
.due-amber{color:var(--warn);font-weight:500}
a.tx{color:var(--accent-deep);text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--rule)}
a.tx:hover{text-decoration-color:var(--accent)}
.hide{display:none!important}

@media(max-width:940px){
  .rail{position:static;width:100%;height:auto;flex-direction:row;align-items:center;padding:10px 14px;gap:10px;border-right:none;border-bottom:1px solid var(--rule)}
  .wordmark{padding:0;border:none}
  .rail nav{display:flex;padding:0;overflow-x:auto;gap:2px}
  .rail .nav-group,.rail-foot,.rail .nav-count{display:none}
  .main{margin-left:0}
  .cols.c2,.cols.c32,.grid2,.grid3{grid-template-columns:1fr}
  .search{width:150px}
  .content{padding:18px 14px 50px}
}
</style>
</head>
<body>
<!-- auth gate -->
<div id="authView" class="auth hide">
  <div class="card">
    <h1>Parker</h1>
    <span class="tag">client operations · cloud</span>
    <div id="authErr"></div>
    <div class="fg"><label for="au_email">Email</label><input id="au_email" type="email" autocomplete="username"></div>
    <div class="fg"><label for="au_pass">Password</label><input id="au_pass" type="password" autocomplete="current-password"></div>
    <button class="btn pri" id="authBtn" onclick="doAuth()">Sign in</button>
    <div class="swap" id="authSwap"></div>
  </div>
</div>

<!-- app shell -->
<div id="appShell" class="hide">
<aside class="rail">
  <div class="wordmark">
    <span class="wm" id="wmName">Parker</span>
    <span class="wm-tag">client operations</span>
  </div>
  <nav id="railNav"></nav>
  <div class="rail-foot">
    <div class="saved"><span class="dot"></span><span id="saveState">Synced</span></div>
    <button onclick="signOut()">Sign out</button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="crumbs" id="crumbs"></div>
    <label class="search">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
      <input id="globalSearch" placeholder="Search clients, leads, tasks" autocomplete="off">
      <kbd>/</kbd>
    </label>
  </div>
  <div class="content" id="view"></div>
</div>
</div>

<!-- generic record modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn danger left hide" id="modalDelete">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn pri" id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span><button id="toastAction"></button></div>
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
/* ============ constants ============ */
const CLIENT_STATUSES=['Prospect','Contacted','Proposal Sent','Won','Active','Paused','Churned'];
const PIPE_STAGES=['Prospect','Contacted','Proposal Sent','Won','Active'];
const LEAD_STAGES=['New','Contacted','Quoted','Won','Lost'];
const TASK_TYPES=['Setup','Optimization','Report','Check-in','Creative','Admin'];
const TASK_STATUSES=['To Do','In Progress','Done'];
const JOB_STATUSES=['Scheduled','Completed','Canceled'];
const QUOTE_STATUSES=['Sent','Accepted','Declined'];
const SOURCES=['Meta Ad','Cold Email','Referral','Organic','Google','Other'];
const EMP_STATUSES=['Active','Paused','Terminated'];
const PAY_TYPES=['Hourly','Salary'];
const ASSIGN_STATUSES=['To Do','In Progress','Blocked','Done'];
const ASSIGN_PRIORITIES=['Low','Normal','High'];
const CAMPAIGN_STATUSES=['Draft','Active','Paused','Done'];
const CONTACT_STATUSES=['Lead','Contacted','Replied','Needs Follow-up','Closed Won','Closed Lost'];
const OB=[
 {p:'Phase 0 · Close & agreement',items:['Agreement signed','First payment collected','Welcome email sent','Client record created']},
 {p:'Phase 1 · Discovery',items:['Goals + customer value captured','Ad budget confirmed','Offer + service area defined','Current lead sources documented','Brand assets collected']},
 {p:'Phase 2 · Access & provisioning',items:['Business Manager partner access','Ad account access','Facebook Page access','Instagram linked','Website access / contact','Payment method on ad account','Domain ready for verification']},
 {p:'Phase 3 · Technical setup',items:['Domain verified','Pixel installed','Conversions API configured','Conversion events configured','Test events verified','Audiences built']},

/* ============ utils ============ */
function uid(p){ return p+'-'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ n=+n||0; return n?'$'+n.toLocaleString(undefined,{maximumFractionDigits:0}):'—'; }
function fmtDate(s){ if(!s)return '—'; const d=new Date(s+'T00:00'); if(isNaN(d))return esc(s); return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:d.getFullYear()===new Date().getFullYear()?undefined:'numeric'}); }
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function today(){ return ymd(new Date()); }
function monthKey(d){ return ymd(d||new Date()).slice(0,7); }
function monthLabel(k){ const [y,m]=k.split('-'); return new Date(+y,+m-1,1).toLocaleDateString(undefined,{month:'short',year:'2-digit'}); }
function daysUntil(s){ if(!s)return null; return Math.round((new Date(s+'T00:00')-new Date(today()+'T00:00'))/864e5); }
function chipClass(s){ const m={'Proposal Sent':'Proposal','In Progress':'InProgress','To Do':'Todo'}; return 's-'+(m[s]||String(s||'').replace(/\s/g,'')); }
function chip(s){ return '<span class="chip '+chipClass(s)+'">'+esc(s)+'</span>'; }
function client(id){ return db.clients.find(c=>c.id===id); }
function employee(id){ return db.employees.find(e=>e.id===id); }
function entryHours(t){ return Math.max(0,(new Date(t.clock_out||Date.now())-new Date(t.clock_in))/36e5); }
function openEntry(e){ return e.time_entries.find(t=>!t.clock_out); }
function fmtHours(h){ return (Math.round(h*100)/100).toFixed(2)+' h'; }
function fmtDT(s){ if(!s)return '—'; const d=new Date(s); if(isNaN(d))return esc(s); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
function grossFor(e,hours){ return e.pay_type==='Salary'?Math.round(+e.pay_rate*100)/100:Math.round(hours*+e.pay_rate*100)/100; }
function ratio(a,b){ return b>0?a/b:null; }
function fmtRatio(v,pre,dec){ return v==null?'—':(pre||'')+v.toFixed(dec==null?2:dec); }
function selOpts(list,cur){ return list.map(o=>'<option'+(o===cur?' selected':'')+'>'+esc(o)+'</option>').join(''); }

async function doAuth(){
 const email=document.getElementById('au_email').value.trim();
 const pass=document.getElementById('au_pass').value;
 if(!email||!pass){ authError('Enter your email and password.'); return; }
 const btn=document.getElementById('authBtn'); btn.disabled=true; authError('');
 try{
  let session;
  if(authMode==='signup'){
   const {data,error}=await sb.auth.signUp({email,password:pass});
   if(error) throw error;
   session=data.session;
   if(!session){ authError('Almost there — confirm the email we just sent you, then sign in.'); setAuthMode('signin'); return; }
  } else {
   const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
   if(error) throw error;
   session=data.session;
  }
  await boot(session);
 }catch(e){ authError(e.message||'Sign-in failed.'); }
 finally{ btn.disabled=false; }
}

function toast(msg,actionLabel,fn){

}

function buildForm(fields){
 let html='', row=[];
 const flush=()=>{ if(!row.length)return; html+=row.length===1?row[0]:'<div class="grid'+Math.min(row.length,3)+'">'+row.join('')+'</div>'; row=[]; };
 fields.forEach(f=>{
  let inner;
  const v=f.value==null?'':f.value;
  if(f.type==='select') inner='<select id="f_'+f.k+'">'+selOpts(f.options,v)+'</select>';
  else if(f.type==='textarea') inner='<textarea id="f_'+f.k+'" rows="3">'+esc(v)+'</textarea>';
  else if(f.type==='color') inner='<input id="f_'+f.k+'" type="color" value="'+esc(v||'#2e6b4f')+'" style="height:36px;padding:3px">';
  else inner='<input id="f_'+f.k+'" type="'+(f.type||'text')+'" value="'+esc(v)+'"'+(f.placeholder?' placeholder="'+esc(f.placeholder)+'"':'')+'>';
  const cell='<div class="fg"><label for="f_'+f.k+'">'+esc(f.label)+'</label>'+inner+'</div>';
  if(f.full){ flush(); html+=cell; } else { row.push(cell); if(row.length===2){flush();} }
 });
 flush(); return html;
}

function renderDashboard(){
 const act=db.clients.filter(c=>c.status==='Active');
 const mrr=act.reduce((s,c)=>s+(+c.monthly_retainer||0),0);
 const mk=monthKey();
 let spend=0,leads=0,revenue=0;
 db.clients.forEach(c=>c.ads.forEach(a=>{ if(a.period===mk){spend+=+a.spend||0;leads+=+a.leads||0;revenue+=+a.revenue||0;} }));
 const cpl=ratio(spend,leads);
 const dueTasks=db.tasks.filter(t=>t.status!=='Done'&&t.due&&daysUntil(t.due)<=7).sort((a,b)=>a.due<b.due?-1:1);
 const renewals=db.clients.filter(c=>c.renewal_date&&daysUntil(c.renewal_date)!=null&&daysUntil(c.renewal_date)<=30&&daysUntil(c.renewal_date)>=0);
 const followups=[];
 db.clients.forEach(c=>c.leads.forEach(l=>{ if(l.follow_up&&!['Won','Lost'].includes(l.stage)&&daysUntil(l.follow_up)<=2) followups.push({c,l}); }));
 followups.sort((a,b)=>a.l.follow_up<b.l.follow_up?-1:1);
 const recent=[];

function bindDnD(){
 document.querySelectorAll('.kcard[draggable]').forEach(el=>{
  el.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/plain',JSON.stringify({cid:el.dataset.cid||'',lid:el.dataset.lid||'',aid:el.dataset.aid||''})); el.classList.add('dragging'); });
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
 });
 document.querySelectorAll('.kcol').forEach(col=>{
  col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('dragover'); });
  col.addEventListener('dragleave',()=>col.classList.remove('dragover'));
  col.addEventListener('drop',e=>{
   e.preventDefault(); col.classList.remove('dragover');
   let d; try{ d=JSON.parse(e.dataTransfer.getData('text/plain')); }catch(err){ return; }
   if(d.cid&&!d.lid){ const c=client(d.cid); if(c&&col.dataset.stage){ c.status=col.dataset.stage; render(); upd('clients',{status:c.status},c.id); } }
   if(d.lid){ const c=client(route.id); if(c){ const l=c.leads.find(x=>x.id===d.lid); if(l&&col.dataset.stage){ l.stage=col.dataset.stage; render(); upd('leads',{stage:l.stage},l.id); } } }
   if(d.aid){ const e=employee(route.id); if(e){ const a=e.assignments.find(x=>x.id===d.aid); if(a&&col.dataset.stage){ a.status=col.dataset.stage; render(); upd('assignments',{status:a.status,updated_at:new Date().toISOString()},a.id); } } }
  });
 });
}

function barChart(series,prefix){
 if(!series.length) return '';
 const W=440,H=150,pad=6,bw=Math.min(46,(W-pad*2)/series.length-8);
 const max=Math.max(...series.map(s=>s.v),1);
 let bars='';
 series.forEach((s,i)=>{
  const x=pad+i*((W-pad*2)/series.length)+((W-pad*2)/series.length-bw)/2;
  const h=Math.max(2,(s.v/max)*(H-38));
  const y=H-22-h;
  bars+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+h.toFixed(1)+'" rx="3" fill="var(--accent)" opacity="0.85"/>'
   +'<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-5).toFixed(1)+'" text-anchor="middle" font-size="10" fill="var(--muted)" style="font-family:var(--font-mono)">'+(prefix==='$'?'$'+Math.round(s.v).toLocaleString():Math.round(s.v))+'</text>'
   +'<text x="'+(x+bw/2).toFixed(1)+'" y="'+(H-7)+'" text-anchor="middle" font-size="10" fill="var(--neutral)">'+esc(s.label)+'</text>';
 });
 return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="bar chart">'+bars+'</svg>';
}

function completeTask(id){
 const t=db.tasks.find(x=>x.id===id); if(!t)return;
 if(t.status==='Done'){ t.status='To Do'; render(); upd('tasks',{status:'To Do'},id); return; }
 t.status='Done';
 upd('tasks',{status:'Done'},id);
 if(t.recurring&&t.recurring!=='None'&&t.due){
  const d=new Date(t.due+'T00:00');
  if(t.recurring==='Weekly')d.setDate(d.getDate()+7); else d.setMonth(d.getMonth()+1);
  const nt={id:uid('TK'),client_id:t.client_id,title:t.title,type:t.type,due:ymd(d),recurring:t.recurring,status:'To Do',notes:t.notes};
  db.tasks.push(nt); wr('tasks',[taskRow(nt)]);
 }
 render();
}

function agencyClockOut(eid,tid){

 upd('time_entries',{clock_out:t.clock_out},tid);
}
function markPayPaid(eid,pid){ const e=employee(eid); const p=e&&e.pay_periods.find(x=>x.id===pid); if(p){ p.status='Paid'; p.date_paid=today(); render(); upd('pay_periods',{status:'Paid',date_paid:p.date_paid},pid); } }
function markPayUnpaid(eid,pid){ const e=employee(eid); const p=e&&e.pay_periods.find(x=>x.id===pid); if(p){ p.status='Pending'; p.date_paid=null; render(); upd('pay_periods',{status:'Pending',date_paid:null},pid); } }
function deletePayPeriod(eid,pid){
 const e=employee(eid); if(!e)return;
 const i=e.pay_periods.findIndex(x=>x.id===pid); if(i<0)return;
 const [p]=e.pay_periods.splice(i,1); render(); rm('pay_periods',pid);
 toast('Deleted pay period','Undo',()=>{ e.pay_periods.splice(i,0,p); render(); wr('pay_periods',[payRow(e.id,p)]); });
}

function exportBackup(){

function exportCSV(){
 const rows=[['client','lead_id','name','email','phone','address','stage','source','job_type','quote_value','date_received','follow_up','notes']];
 db.clients.forEach(c=>c.leads.forEach(l=>rows.push([c.business_name,l.id,l.name,l.email,l.phone,l.address,l.stage,l.source,l.job_type,l.quote_value,l.date_received,l.follow_up,l.notes])));
 const csv=rows.map(r=>r.map(v=>{v=v==null?'':String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(',')).join('\n');
 download('leads-'+today()+'.csv',csv,'text/csv'); toast('CSV downloaded');
}
async function migrateToCloud(d){
 const data = (d.v===2&&d.clients) ? d : migrateV1(d);
 const clients=[],leads=[],jobs=[],quotes=[],ads=[],invoices=[],tasks=[];
 (data.clients||[]).forEach(c=>{
  clients.push(clientRow(c));
  (c.leads||[]).forEach(l=>leads.push(leadRow(c.id,l)));
  (c.jobs||[]).forEach(j=>jobs.push(jobRow(c.id,j)));
  (c.quotes||[]).forEach(q=>quotes.push(quoteRow(c.id,q)));
  (c.ads||[]).forEach(a=>ads.push(adRow(c.id,a)));
  (c.invoices||[]).forEach(i=>invoices.push(invRow(c.id,i)));
 });
 (data.tasks||[]).forEach(t=>tasks.push(taskRow(t)));
 if(!clients.length){ toast('No clients found in that file'); return; }
 toast('Migrating '+clients.length+' client'+(clients.length===1?'':'s')+'…');
 const sets=[['clients',clients],['leads',leads],['jobs',jobs],['quotes',quotes],['ads',ads],['invoices',invoices],['tasks',tasks]];
 for(const [t,rows] of sets){
  if(rows.length){ const {error}=await sb.from(t).upsert(rows); if(error){ toast('Migration failed on '+t+': '+error.message); return; } }
 }
 await fetchAll(); render();
 toast('Migrated '+clients.length+' clients and '+leads.length+' leads to the cloud');
}
document.getElementById('fileInput').addEventListener('change',e=>{
 const f=e.target.files[0]; if(!f)return;
 const r=new FileReader();
 r.onload=()=>{
  try{
   const d=JSON.parse(r.result);
   if(d.kind==='pf-portal-update'||d.kind==='pf-portal-setup'||d.kind==='pf-portal-results') toast('Portal files are not needed anymore — the cloud portal syncs live.');
   else if(d.clients) migrateToCloud(d);
   else toast('Not a recognized file');
  }catch(err){ toast('Could not read file: '+err.message); }
 };
 r.readAsText(f); e.target.value='';
});
